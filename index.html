<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>React 3D · Hello World</title>
  <style>
    :root { color-scheme: dark; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #root { width: 100%; height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #0b0d17;
      overflow: hidden;
    }
    #root { position: relative; }
    .overlay {
      position: absolute;
      top: 24px;
      left: 24px;
      z-index: 10;
      pointer-events: none;
      user-select: none;
    }
    .overlay h1 {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: #f4f6ff;
    }
    .overlay p {
      margin-top: 6px;
      font-size: 13px;
      color: #8a93b8;
    }
    .badge {
      display: inline-block;
      margin-top: 12px;
      padding: 4px 10px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      color: #7dd3fc;
      background: rgba(125, 211, 252, 0.1);
      border: 1px solid rgba(125, 211, 252, 0.25);
      border-radius: 999px;
    }
    .hint {
      position: absolute;
      bottom: 20px;
      width: 100%;
      text-align: center;
      z-index: 10;
      pointer-events: none;
      user-select: none;
      font-size: 12px;
      color: #5c6488;
    }
    .loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #8a93b8;
      font-size: 14px;
      z-index: 5;
    }
  </style>

  <!-- Import map: pins ESM builds of React, Three.js and react-three-fiber -->
  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.3.1",
      "react/jsx-runtime": "https://esm.sh/react@18.3.1/jsx-runtime",
      "react-dom": "https://esm.sh/react-dom@18.3.1",
      "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
      "three": "https://esm.sh/three@0.160.1",
      "@react-three/fiber": "https://esm.sh/@react-three/fiber@8.15.19?external=react,react-dom,three",
      "@react-three/drei": "https://esm.sh/@react-three/drei@9.99.0?external=react,react-dom,three,@react-three/fiber"
    }
  }
  </script>
</head>
<body>
  <div id="root">
    <div class="loading" id="loading">Loading 3D scene…</div>
  </div>

  <script type="module">
    import React, { useRef, useState } from "react";
    import { createRoot } from "react-dom/client";
    import { Canvas, useFrame } from "@react-three/fiber";
    import { OrbitControls, Text, Float, Stars } from "@react-three/drei";

    const h = React.createElement;

    // ---- 4D tesseract (hypercube) geometry ----------------------------------
    // 16 vertices: every combination of (±1, ±1, ±1, ±1).
    const TESSERACT_VERTICES = [];
    for (let i = 0; i < 16; i++) {
      TESSERACT_VERTICES.push([
        (i & 1) ? 1 : -1,
        (i & 2) ? 1 : -1,
        (i & 4) ? 1 : -1,
        (i & 8) ? 1 : -1,
      ]);
    }
    // 32 edges: pairs of vertices that differ in exactly one coordinate.
    const TESSERACT_EDGES = [];
    for (let a = 0; a < 16; a++) {
      for (let b = a + 1; b < 16; b++) {
        const diff = a ^ b;
        if (diff && (diff & (diff - 1)) === 0) TESSERACT_EDGES.push([a, b]);
      }
    }

    // Rotate a 4D point in the given plane by `angle`.
    function rotate4d(p, i, j, angle) {
      const c = Math.cos(angle);
      const s = Math.sin(angle);
      const vi = p[i];
      const vj = p[j];
      p[i] = vi * c - vj * s;
      p[j] = vi * s + vj * c;
    }

    // Two-endpoint gradient used to paint every edge/vertex by its live 4th-
    // dimension (w) coordinate. As the hypercube rotates through the XW plane
    // the *same* eight vertices sweep from far-in-w to near-in-w, so a cube
    // that starts life as the tiny inner cube glow-shifts and swells until it
    // becomes the big outer cube — and vice versa. Colour makes the otherwise
    // invisible 4th axis directly readable.
    const PALETTE = {
      // [innerColor (low w, far), outerColor (high w, near)]
      cool: [[55, 48, 163], [34, 211, 238]],   // indigo  -> cyan
      warm: [[124, 58, 237], [245, 158, 11]],  // violet  -> amber
    };

    // Write an RGB colour for a given w into out[o..o+2].
    function paintByW(w, ramp, out, o) {
      // w spans roughly [-sqrt2, +sqrt2] after a 4D rotation.
      let t = (w + 1.414) / 2.828;
      t = t < 0 ? 0 : t > 1 ? 1 : t;
      // ease so the inner/outer extremes read stronger
      const e = t * t * (3 - 2 * t);
      const a = ramp[0];
      const b = ramp[1];
      out[o] = (a[0] + (b[0] - a[0]) * e) / 255;
      out[o + 1] = (a[1] + (b[1] - a[1]) * e) / 255;
      out[o + 2] = (a[2] + (b[2] - a[2]) * e) / 255;
    }

    // A tesseract whose signature XW rotation turns it inside-out: the inner
    // cube inflates outward while the outer cube collapses through the middle,
    // over and over. Colour encodes the hidden w axis. Hover to warm the
    // palette, click to freeze the inversion mid-turn.
    function Tesseract() {
      const group = useRef();
      const edgesRef = useRef();
      const vertsRef = useRef();
      const [hovered, setHovered] = useState(false);
      const [folding, setFolding] = useState(true);
      const t = useRef(0);

      // Reusable buffers: 32 edges * 2 endpoints * 3 components.
      const edgePositions = React.useMemo(() => new Float32Array(32 * 2 * 3), []);
      const edgeColors = React.useMemo(() => new Float32Array(32 * 2 * 3), []);
      const vertPositions = React.useMemo(() => new Float32Array(16 * 3), []);
      const vertColors = React.useMemo(() => new Float32Array(16 * 3), []);

      useFrame((_, delta) => {
        if (folding) t.current += delta;
        const tt = t.current;
        const ramp = hovered ? PALETTE.warm : PALETTE.cool;

        // The XW rotation is the star of the show: it swaps each vertex's
        // depth-in-w, driving the inner<->outer cube inversion. A slow ZW
        // rotation adds a little organic wobble without muddying the effect.
        const projected = TESSERACT_VERTICES.map((v) => {
          const p = v.slice();
          rotate4d(p, 0, 3, tt * 0.6);        // XW plane — the inversion
          rotate4d(p, 2, 3, tt * 0.16);       // gentle ZW for depth
          // Perspective projection from 4D to 3D (divide by distance in w):
          // higher w -> nearer -> larger (outer), lower w -> smaller (inner).
          const distance = 2.4;
          const s = (1 / (distance - p[3])) * 2.6;
          return [p[0] * s, p[1] * s, p[2] * s, p[3]];
        });

        // Fill vertex points + colours (coloured by their live w).
        for (let i = 0; i < 16; i++) {
          vertPositions[i * 3] = projected[i][0];
          vertPositions[i * 3 + 1] = projected[i][1];
          vertPositions[i * 3 + 2] = projected[i][2];
          paintByW(projected[i][3], ramp, vertColors, i * 3);
        }
        // Fill edge line segments + per-endpoint colours.
        for (let e = 0; e < TESSERACT_EDGES.length; e++) {
          const [a, b] = TESSERACT_EDGES[e];
          const o = e * 6;
          edgePositions[o] = projected[a][0];
          edgePositions[o + 1] = projected[a][1];
          edgePositions[o + 2] = projected[a][2];
          edgePositions[o + 3] = projected[b][0];
          edgePositions[o + 4] = projected[b][1];
          edgePositions[o + 5] = projected[b][2];
          paintByW(projected[a][3], ramp, edgeColors, o);
          paintByW(projected[b][3], ramp, edgeColors, o + 3);
        }

        if (edgesRef.current) {
          edgesRef.current.attributes.position.needsUpdate = true;
          edgesRef.current.attributes.color.needsUpdate = true;
        }
        if (vertsRef.current) {
          vertsRef.current.attributes.position.needsUpdate = true;
          vertsRef.current.attributes.color.needsUpdate = true;
        }
        if (group.current) group.current.rotation.y += delta * 0.12;
      });

      return h(
        "group",
        {
          ref: group,
          position: [0, -0.2, 0],
          onPointerOver: () => setHovered(true),
          onPointerOut: () => setHovered(false),
          onClick: () => setFolding((v) => !v),
        },
        // Edges (the inverting wireframe), coloured by 4D depth.
        h(
          "lineSegments",
          null,
          h(
            "bufferGeometry",
            { ref: edgesRef },
            h("bufferAttribute", {
              attach: "attributes-position",
              array: edgePositions,
              count: 32 * 2,
              itemSize: 3,
            }),
            h("bufferAttribute", {
              attach: "attributes-color",
              array: edgeColors,
              count: 32 * 2,
              itemSize: 3,
            })
          ),
          h("lineBasicMaterial", {
            vertexColors: true,
            transparent: true,
            opacity: 0.95,
          })
        ),
        // Glowing vertices, also coloured by 4D depth.
        h(
          "points",
          null,
          h(
            "bufferGeometry",
            { ref: vertsRef },
            h("bufferAttribute", {
              attach: "attributes-position",
              array: vertPositions,
              count: 16,
              itemSize: 3,
            }),
            h("bufferAttribute", {
              attach: "attributes-color",
              array: vertColors,
              count: 16,
              itemSize: 3,
            })
          ),
          h("pointsMaterial", {
            vertexColors: true,
            size: 0.17,
            sizeAttenuation: true,
          })
        )
      );
    }

    function HelloText() {
      return h(
        Float,
        { speed: 2, rotationIntensity: 0.4, floatIntensity: 0.8 },
        h(
          Text,
          {
            position: [0, 1.8, 0],
            fontSize: 0.7,
            color: "#f4f6ff",
            anchorX: "center",
            anchorY: "middle",
            outlineWidth: 0.02,
            outlineColor: "#0b0d17",
          },
          "Hello, World!"
        )
      );
    }

    function Scene() {
      return h(
        React.Fragment,
        null,
        h("ambientLight", { intensity: 0.6 }),
        h("directionalLight", { position: [5, 5, 5], intensity: 1.2 }),
        h("pointLight", { position: [-5, -3, -5], intensity: 0.5, color: "#7dd3fc" }),
        h(Stars, { radius: 80, depth: 40, count: 3000, factor: 4, fade: true, speed: 1 }),
        h(HelloText, null),
        h(Tesseract, null),
        h(OrbitControls, { enablePan: false, minDistance: 3, maxDistance: 12 })
      );
    }

    function App() {
      return h(
        React.Fragment,
        null,
        h(
          "div",
          { className: "overlay" },
          h("h1", null, "React 3D Environment"),
          h("p", null, "react-three-fiber · three.js · drei"),
          h("span", { className: "badge" }, "Hello World")
        ),
        h(
          "div",
          { className: "hint" },
          "Watch the inner cube turn inside-out into the outer cube · colour = the 4th dimension · drag to orbit · scroll to zoom · click to freeze"
        ),
        h(
          Canvas,
          {
            camera: { position: [0, 0, 6], fov: 50 },
            onCreated: () => {
              const el = document.getElementById("loading");
              if (el) el.remove();
            },
          },
          h(Scene, null)
        )
      );
    }

    createRoot(document.getElementById("root")).render(h(App, null));
  </script>
</body>
</html>
