<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>React 3D · Hello World</title>
  <style>
    :root { color-scheme: dark; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #root { width: 100%; height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #0b0d17;
      overflow: hidden;
    }
    #root { position: relative; }
    .overlay {
      position: absolute;
      top: 24px;
      left: 24px;
      z-index: 10;
      pointer-events: none;
      user-select: none;
    }
    .overlay h1 {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: #f4f6ff;
    }
    .overlay p {
      margin-top: 6px;
      font-size: 13px;
      color: #8a93b8;
    }
    .badge {
      display: inline-block;
      margin-top: 12px;
      padding: 4px 10px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      color: #7dd3fc;
      background: rgba(125, 211, 252, 0.1);
      border: 1px solid rgba(125, 211, 252, 0.25);
      border-radius: 999px;
    }
    .hint {
      position: absolute;
      bottom: 20px;
      width: 100%;
      text-align: center;
      z-index: 10;
      pointer-events: none;
      user-select: none;
      font-size: 12px;
      color: #5c6488;
    }
    .loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #8a93b8;
      font-size: 14px;
      z-index: 5;
    }
  </style>

  <!-- Import map: pins ESM builds of React, Three.js and react-three-fiber -->
  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.3.1",
      "react/jsx-runtime": "https://esm.sh/react@18.3.1/jsx-runtime",
      "react-dom": "https://esm.sh/react-dom@18.3.1",
      "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
      "three": "https://esm.sh/three@0.160.1",
      "@react-three/fiber": "https://esm.sh/@react-three/fiber@8.15.19?external=react,react-dom,three",
      "@react-three/drei": "https://esm.sh/@react-three/drei@9.99.0?external=react,react-dom,three,@react-three/fiber"
    }
  }
  </script>
</head>
<body>
  <div id="root">
    <div class="loading" id="loading">Loading 3D scene…</div>
  </div>

  <script type="module">
    import React, { useRef, useState } from "react";
    import { createRoot } from "react-dom/client";
    import { Canvas, useFrame } from "@react-three/fiber";
    import { OrbitControls, Text, Float, Stars } from "@react-three/drei";

    const h = React.createElement;

    // A spinning, hover-reactive cube.
    function SpinningCube() {
      const mesh = useRef();
      const [hovered, setHovered] = useState(false);
      const [active, setActive] = useState(false);

      useFrame((_, delta) => {
        if (!mesh.current) return;
        mesh.current.rotation.x += delta * 0.4;
        mesh.current.rotation.y += delta * 0.6;
      });

      const scale = active ? 1.4 : 1;

      return h(
        "mesh",
        {
          ref: mesh,
          position: [0, -0.2, 0],
          scale,
          onPointerOver: () => setHovered(true),
          onPointerOut: () => setHovered(false),
          onClick: () => setActive((v) => !v),
        },
        h("boxGeometry", { args: [1.6, 1.6, 1.6] }),
        h("meshStandardMaterial", {
          color: hovered ? "#7dd3fc" : "#6366f1",
          metalness: 0.3,
          roughness: 0.25,
        })
      );
    }

    function HelloText() {
      return h(
        Float,
        { speed: 2, rotationIntensity: 0.4, floatIntensity: 0.8 },
        h(
          Text,
          {
            position: [0, 1.8, 0],
            fontSize: 0.7,
            color: "#f4f6ff",
            anchorX: "center",
            anchorY: "middle",
            outlineWidth: 0.02,
            outlineColor: "#0b0d17",
          },
          "Hello, World!"
        )
      );
    }

    function Scene() {
      return h(
        React.Fragment,
        null,
        h("ambientLight", { intensity: 0.6 }),
        h("directionalLight", { position: [5, 5, 5], intensity: 1.2 }),
        h("pointLight", { position: [-5, -3, -5], intensity: 0.5, color: "#7dd3fc" }),
        h(Stars, { radius: 80, depth: 40, count: 3000, factor: 4, fade: true, speed: 1 }),
        h(HelloText, null),
        h(SpinningCube, null),
        h(OrbitControls, { enablePan: false, minDistance: 3, maxDistance: 12 })
      );
    }

    function App() {
      return h(
        React.Fragment,
        null,
        h(
          "div",
          { className: "overlay" },
          h("h1", null, "React 3D Environment"),
          h("p", null, "react-three-fiber · three.js · drei"),
          h("span", { className: "badge" }, "Hello World")
        ),
        h(
          "div",
          { className: "hint" },
          "Drag to orbit · scroll to zoom · click the cube to grow it"
        ),
        h(
          Canvas,
          {
            camera: { position: [0, 0, 6], fov: 50 },
            onCreated: () => {
              const el = document.getElementById("loading");
              if (el) el.remove();
            },
          },
          h(Scene, null)
        )
      );
    }

    createRoot(document.getElementById("root")).render(h(App, null));
  </script>
</body>
</html>
