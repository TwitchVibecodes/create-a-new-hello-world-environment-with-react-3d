<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>React 3D · Hello World</title>
  <style>
    :root { color-scheme: dark; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #root { width: 100%; height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #0b0d17;
      overflow: hidden;
    }
    #root { position: relative; }
    .overlay {
      position: absolute;
      top: 24px;
      left: 24px;
      z-index: 10;
      pointer-events: none;
      user-select: none;
    }
    .overlay h1 {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: #f4f6ff;
    }
    .overlay p {
      margin-top: 6px;
      font-size: 13px;
      color: #8a93b8;
    }
    .badge {
      display: inline-block;
      margin-top: 12px;
      padding: 4px 10px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      color: #7dd3fc;
      background: rgba(125, 211, 252, 0.1);
      border: 1px solid rgba(125, 211, 252, 0.25);
      border-radius: 999px;
    }
    .hint {
      position: absolute;
      bottom: 20px;
      width: 100%;
      text-align: center;
      z-index: 10;
      pointer-events: none;
      user-select: none;
      font-size: 12px;
      color: #5c6488;
    }
    .loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #8a93b8;
      font-size: 14px;
      z-index: 5;
    }
  </style>

  <!-- Import map: pins ESM builds of React, Three.js and react-three-fiber -->
  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.3.1",
      "react/jsx-runtime": "https://esm.sh/react@18.3.1/jsx-runtime",
      "react-dom": "https://esm.sh/react-dom@18.3.1",
      "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
      "three": "https://esm.sh/three@0.160.1",
      "@react-three/fiber": "https://esm.sh/@react-three/fiber@8.15.19?external=react,react-dom,three",
      "@react-three/drei": "https://esm.sh/@react-three/drei@9.99.0?external=react,react-dom,three,@react-three/fiber"
    }
  }
  </script>
</head>
<body>
  <div id="root">
    <div class="loading" id="loading">Loading 3D scene…</div>
  </div>

  <script type="module">
    import React, { useRef, useState } from "react";
    import { createRoot } from "react-dom/client";
    import { Canvas, useFrame } from "@react-three/fiber";
    import { OrbitControls, Text, Float, Stars } from "@react-three/drei";

    const h = React.createElement;

    // ---- Brilliant-cut diamond geometry -------------------------------------
    // A classic gem silhouette built as a single faceted solid: a flat table
    // on top, a shallow sloped crown down to the widest ring (the girdle), and
    // a deep pointed pavilion below. Flat shading makes every facet catch the
    // light independently so it reads as a cut diamond.
    const FACETS = 8;                 // 8 sides -> chunky, jewel-like facets
    function makeDiamondGeometry() {
      const table = 0.55;             // radius of the flat top
      const girdle = 1.0;             // radius of the widest ring
      const tableY = 0.55;            // height of the table
      const girdleY = 0.15;           // height of the girdle ring
      const tipY = -1.05;             // the pointed bottom

      const positions = [];
      const pushTri = (a, b, c) => positions.push(...a, ...b, ...c);
      const ring = (r, y) => {
        const pts = [];
        for (let i = 0; i < FACETS; i++) {
          const ang = (i / FACETS) * Math.PI * 2;
          pts.push([Math.cos(ang) * r, y, Math.sin(ang) * r]);
        }
        return pts;
      };

      const tableRing = ring(table, tableY);
      const girdleRing = ring(girdle, girdleY);
      const topCenter = [0, tableY, 0];
      const tip = [0, tipY, 0];

      for (let i = 0; i < FACETS; i++) {
        const n = (i + 1) % FACETS;
        // Flat table (fan from the centre).
        pushTri(topCenter, tableRing[i], tableRing[n]);
        // Crown facets: table edge down to the girdle (two triangles).
        pushTri(tableRing[i], girdleRing[i], girdleRing[n]);
        pushTri(tableRing[i], girdleRing[n], tableRing[n]);
        // Pavilion facets: girdle down to the single point.
        pushTri(girdleRing[i], tip, girdleRing[n]);
      }
      return new Float32Array(positions);
    }

    // Hover swaps the diamond's tint from icy cyan to a warm rose.
    const DIAMOND_COLORS = {
      cool: "#a5f3fc",  // icy cyan
      warm: "#fbcfe8",  // warm rose
    };

    // A slowly turning, faceted diamond. Hover to warm its tint, click to
    // freeze its spin mid-sparkle.
    function Diamond() {
      const group = useRef();
      const geomRef = useRef();
      const [hovered, setHovered] = useState(false);
      const [spinning, setSpinning] = useState(true);

      const vertices = React.useMemo(makeDiamondGeometry, []);

      React.useEffect(() => {
        if (geomRef.current) geomRef.current.computeVertexNormals();
      }, []);

      useFrame((_, delta) => {
        if (spinning && group.current) {
          group.current.rotation.y += delta * 0.5;
        }
      });

      return h(
        "group",
        {
          ref: group,
          position: [0, -0.1, 0],
          onPointerOver: () => setHovered(true),
          onPointerOut: () => setHovered(false),
          onClick: () => setSpinning((v) => !v),
        },
        h(
          "mesh",
          null,
          h(
            "bufferGeometry",
            { ref: geomRef },
            h("bufferAttribute", {
              attach: "attributes-position",
              array: vertices,
              count: vertices.length / 3,
              itemSize: 3,
            })
          ),
          h("meshStandardMaterial", {
            color: hovered ? DIAMOND_COLORS.warm : DIAMOND_COLORS.cool,
            metalness: 0.6,
            roughness: 0.08,
            flatShading: true,
            emissive: hovered ? DIAMOND_COLORS.warm : DIAMOND_COLORS.cool,
            emissiveIntensity: 0.12,
          })
        )
      );
    }

    // ---- A little leprechaun cheering the diamond on ------------------------
    // Built entirely from primitives: a green top hat with a gold buckle, a
    // ruddy face and ginger beard, a green coat, and one arm flung out toward
    // the diamond in a happy "ta-da!" gesture. He gives a gentle excited bob.
    const LEP = {
      coat: "#1a7a3c",
      hat: "#14532d",
      band: "#0f3d21",
      gold: "#facc15",
      skin: "#f5c9a6",
      beard: "#e0742a",
    };

    function Leprechaun() {
      const group = useRef();
      const arm = useRef();

      useFrame((state) => {
        const t = state.clock.elapsedTime;
        if (group.current) {
          // happy little bob + slight sway toward the diamond
          group.current.position.y = -0.55 + Math.sin(t * 3) * 0.06;
          group.current.rotation.z = Math.sin(t * 3) * 0.03;
        }
        if (arm.current) {
          // the pointing arm waves excitedly at the gem
          arm.current.rotation.z = -0.6 + Math.sin(t * 6) * 0.18;
        }
      });

      return h(
        "group",
        // stand him off to the left, turned slightly to face the diamond
        { ref: group, position: [-2.7, -0.55, 0.2], rotation: [0, 0.5, 0], scale: 0.9 },

        // legs
        h("mesh", { position: [-0.16, -0.95, 0] },
          h("cylinderGeometry", { args: [0.11, 0.11, 0.5, 12] }),
          h("meshStandardMaterial", { color: LEP.hat, roughness: 0.8 })),
        h("mesh", { position: [0.16, -0.95, 0] },
          h("cylinderGeometry", { args: [0.11, 0.11, 0.5, 12] }),
          h("meshStandardMaterial", { color: LEP.hat, roughness: 0.8 })),
        // buckled shoes
        h("mesh", { position: [-0.16, -1.24, 0.08] },
          h("boxGeometry", { args: [0.2, 0.14, 0.34] }),
          h("meshStandardMaterial", { color: "#3b2412", roughness: 0.7 })),
        h("mesh", { position: [0.16, -1.24, 0.08] },
          h("boxGeometry", { args: [0.2, 0.14, 0.34] }),
          h("meshStandardMaterial", { color: "#3b2412", roughness: 0.7 })),

        // pot-bellied coat / body
        h("mesh", { position: [0, -0.42, 0] },
          h("sphereGeometry", { args: [0.42, 20, 20] }),
          h("meshStandardMaterial", { color: LEP.coat, roughness: 0.65 })),
        // belt + gold buckle
        h("mesh", { position: [0, -0.5, 0.34], rotation: [Math.PI / 2, 0, 0] },
          h("cylinderGeometry", { args: [0.14, 0.14, 0.1, 6] }),
          h("meshStandardMaterial", { color: LEP.gold, metalness: 0.7, roughness: 0.25 })),

        // left arm resting on the belly
        h("mesh", { position: [-0.42, -0.3, 0.05], rotation: [0, 0, 0.9] },
          h("cylinderGeometry", { args: [0.08, 0.08, 0.5, 10] }),
          h("meshStandardMaterial", { color: LEP.coat, roughness: 0.65 })),

        // right arm flung out toward the diamond (pivots at the shoulder)
        h("group", { ref: arm, position: [0.34, -0.18, 0.1] },
          h("mesh", { position: [0.3, 0, 0], rotation: [0, 0, Math.PI / 2] },
            h("cylinderGeometry", { args: [0.08, 0.08, 0.62, 10] }),
            h("meshStandardMaterial", { color: LEP.coat, roughness: 0.65 })),
          // open hand presenting the gem
          h("mesh", { position: [0.66, 0, 0] },
            h("sphereGeometry", { args: [0.1, 12, 12] }),
            h("meshStandardMaterial", { color: LEP.skin, roughness: 0.6 }))),

        // head
        h("mesh", { position: [0, 0.18, 0] },
          h("sphereGeometry", { args: [0.28, 24, 24] }),
          h("meshStandardMaterial", { color: LEP.skin, roughness: 0.6 })),
        // rosy cheeks
        h("mesh", { position: [-0.14, 0.12, 0.22] },
          h("sphereGeometry", { args: [0.06, 10, 10] }),
          h("meshStandardMaterial", { color: "#f2a08a", roughness: 0.7 })),
        h("mesh", { position: [0.14, 0.12, 0.22] },
          h("sphereGeometry", { args: [0.06, 10, 10] }),
          h("meshStandardMaterial", { color: "#f2a08a", roughness: 0.7 })),
        // eyes
        h("mesh", { position: [-0.1, 0.24, 0.25] },
          h("sphereGeometry", { args: [0.035, 8, 8] }),
          h("meshStandardMaterial", { color: "#20242e" })),
        h("mesh", { position: [0.1, 0.24, 0.25] },
          h("sphereGeometry", { args: [0.035, 8, 8] }),
          h("meshStandardMaterial", { color: "#20242e" })),
        // ginger beard
        h("mesh", { position: [0, 0.02, 0.16], rotation: [Math.PI, 0, 0] },
          h("coneGeometry", { args: [0.26, 0.42, 20] }),
          h("meshStandardMaterial", { color: LEP.beard, roughness: 0.85 })),

        // top hat — brim, stack, band and buckle
        h("mesh", { position: [0, 0.42, 0] },
          h("cylinderGeometry", { args: [0.42, 0.42, 0.05, 24] }),
          h("meshStandardMaterial", { color: LEP.hat, roughness: 0.7 })),
        h("mesh", { position: [0, 0.64, 0] },
          h("cylinderGeometry", { args: [0.27, 0.29, 0.42, 24] }),
          h("meshStandardMaterial", { color: LEP.hat, roughness: 0.7 })),
        h("mesh", { position: [0, 0.5, 0] },
          h("cylinderGeometry", { args: [0.295, 0.305, 0.1, 24] }),
          h("meshStandardMaterial", { color: LEP.band, roughness: 0.7 })),
        h("mesh", { position: [0, 0.5, 0.29] },
          h("boxGeometry", { args: [0.12, 0.09, 0.03] }),
          h("meshStandardMaterial", { color: LEP.gold, metalness: 0.7, roughness: 0.25 }))
      );
    }

    function HelloText() {
      return h(
        Float,
        { speed: 2, rotationIntensity: 0.4, floatIntensity: 0.8 },
        h(
          Text,
          {
            position: [0, 1.8, 0],
            fontSize: 0.7,
            color: "#f4f6ff",
            anchorX: "center",
            anchorY: "middle",
            outlineWidth: 0.02,
            outlineColor: "#0b0d17",
          },
          "Larry the Leprechaun"
        )
      );
    }

    // A small caption floating just to the right of the diamond.
    function ArmMessage() {
      return h(
        Text,
        {
          position: [1.7, 0.1, 0],
          fontSize: 0.22,
          color: "#a5f3fc",
          anchorX: "left",
          anchorY: "middle",
          maxWidth: 2.2,
          lineHeight: 1.15,
          outlineWidth: 0.01,
          outlineColor: "#0b0d17",
        },
        "Larry lost his arm in the war"
      );
    }

    function Scene() {
      return h(
        React.Fragment,
        null,
        h("ambientLight", { intensity: 0.6 }),
        h("directionalLight", { position: [5, 5, 5], intensity: 1.2 }),
        h("pointLight", { position: [-5, -3, -5], intensity: 0.5, color: "#7dd3fc" }),
        h(Stars, { radius: 80, depth: 40, count: 3000, factor: 4, fade: true, speed: 1 }),
        h(HelloText, null),
        h(ArmMessage, null),
        h(Diamond, null),
        h(Leprechaun, null),
        h(OrbitControls, { enablePan: false, minDistance: 3, maxDistance: 12 })
      );
    }

    function App() {
      return h(
        React.Fragment,
        null,
        h(
          "div",
          { className: "overlay" },
          h("h1", null, "React 3D Environment"),
          h("p", null, "react-three-fiber · three.js · drei"),
          h("span", { className: "badge" }, "Hello World")
        ),
        h(
          "div",
          { className: "hint" },
          "A leprechaun shows off his faceted diamond · hover to warm its tint · drag to orbit · scroll to zoom · click to freeze the spin"
        ),
        h(
          Canvas,
          {
            camera: { position: [0, 0, 6], fov: 50 },
            onCreated: () => {
              const el = document.getElementById("loading");
              if (el) el.remove();
            },
          },
          h(Scene, null)
        )
      );
    }

    createRoot(document.getElementById("root")).render(h(App, null));
  </script>
</body>
</html>
