<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>React 3D · Hello World</title>
  <style>
    :root { color-scheme: dark; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #root { width: 100%; height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(#87ceeb 0%, #bfe3f0 45%, #d9f2e0 100%);
      overflow: hidden;
    }
    #root { position: relative; }
    .overlay {
      position: absolute;
      top: 24px;
      left: 24px;
      z-index: 10;
      pointer-events: none;
      user-select: none;
    }
    .overlay h1 {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: #f4f6ff;
    }
    .overlay p {
      margin-top: 6px;
      font-size: 13px;
      color: #8a93b8;
    }
    .badge {
      display: inline-block;
      margin-top: 12px;
      padding: 4px 10px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      color: #7dd3fc;
      background: rgba(125, 211, 252, 0.1);
      border: 1px solid rgba(125, 211, 252, 0.25);
      border-radius: 999px;
    }
    .hint {
      position: absolute;
      bottom: 20px;
      width: 100%;
      text-align: center;
      z-index: 10;
      pointer-events: none;
      user-select: none;
      font-size: 12px;
      color: #5c6488;
    }
    .loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #8a93b8;
      font-size: 14px;
      z-index: 5;
    }
    .chatbar {
      position: absolute;
      bottom: 46px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .chatbar input {
      width: 260px;
      padding: 8px 12px;
      font-size: 13px;
      color: #f4f6ff;
      background: rgba(11, 13, 23, 0.55);
      border: 1px solid rgba(125, 211, 252, 0.35);
      border-radius: 999px;
      outline: none;
      backdrop-filter: blur(4px);
    }
    .chatbar input::placeholder { color: #8a93b8; }
    .chatbar input:focus { border-color: rgba(125, 211, 252, 0.7); }
  </style>

  <!-- Import map: pins ESM builds of React, Three.js and react-three-fiber -->
  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.3.1",
      "react/jsx-runtime": "https://esm.sh/react@18.3.1/jsx-runtime",
      "react-dom": "https://esm.sh/react-dom@18.3.1",
      "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
      "three": "https://esm.sh/three@0.160.1",
      "@react-three/fiber": "https://esm.sh/@react-three/fiber@8.15.19?external=react,react-dom,three",
      "@react-three/drei": "https://esm.sh/@react-three/drei@9.99.0?external=react,react-dom,three,@react-three/fiber"
    }
  }
  </script>
</head>
<body>
  <div id="root">
    <div class="loading" id="loading">Loading 3D scene…</div>
  </div>

  <script type="module">
    import React, { useRef, useState } from "react";
    import { createRoot } from "react-dom/client";
    import { Canvas, useFrame } from "@react-three/fiber";
    import { OrbitControls, Text, Float } from "@react-three/drei";

    const h = React.createElement;

    // ---- Rainbow ------------------------------------------------------------
    // Seven concentric half-torus arcs (red outermost -> violet innermost)
    // standing upright in the XY plane so the arc faces the camera and sweeps
    // over the pot below.
    const RAINBOW_COLORS = [
      "#ff4d4d", // red
      "#ff9d3c", // orange
      "#ffe14d", // yellow
      "#4dff6a", // green
      "#4db8ff", // blue
      "#4d5bff", // indigo
      "#a24dff", // violet
    ];

    function Rainbow() {
      return h(
        "group",
        { position: [0, 0.2, -1.2] },
        RAINBOW_COLORS.map((c, i) =>
          h(
            "mesh",
            { key: i },
            // args: [radius, tube, radialSegments, tubularSegments, arc]
            // arc = Math.PI -> only the upper half of the ring.
            h("torusGeometry", { args: [2.6 - i * 0.16, 0.07, 16, 96, Math.PI] }),
            h("meshStandardMaterial", {
              color: c,
              emissive: c,
              emissiveIntensity: 0.45,
              roughness: 0.6,
              metalness: 0.0,
            })
          )
        )
      );
    }

    // ---- Pot of gold --------------------------------------------------------
    // A little cast-iron cauldron on three feet, brimming with a heaped pile of
    // glinting gold nuggets. It slowly turns; hover to make the gold glow,
    // click to freeze the spin.
    const POT = {
      iron: "#2b2b30",
      ironDark: "#141417",
      golds: ["#facc15", "#eab308", "#fde047"],
    };

    function PotOfGold() {
      const group = useRef();
      const [hovered, setHovered] = useState(false);
      const [spinning, setSpinning] = useState(true);

      useFrame((_, delta) => {
        if (spinning && group.current) {
          group.current.rotation.y += delta * 0.5;
        }
      });

      // A deterministic little heap of gold nuggets sitting in the pot.
      const nuggets = React.useMemo(() => {
        let seed = 7;
        const rand = () => {
          seed = (seed * 9301 + 49297) % 233280;
          return seed / 233280;
        };
        const arr = [];
        for (let i = 0; i < 28; i++) {
          const a = rand() * Math.PI * 2;
          const r = rand() * 0.55;
          arr.push({
            pos: [Math.cos(a) * r, 0.34 + rand() * 0.16, Math.sin(a) * r],
            s: 0.09 + rand() * 0.07,
            color: POT.golds[i % POT.golds.length],
            rot: [rand() * Math.PI, rand() * Math.PI, rand() * Math.PI],
          });
        }
        return arr;
      }, []);

      return h(
        "group",
        {
          ref: group,
          position: [0, -0.35, 0],
          onPointerOver: () => setHovered(true),
          onPointerOut: () => setHovered(false),
          onClick: () => setSpinning((v) => !v),
        },

        // cauldron body — wider at the mouth, tapering down
        h("mesh", { position: [0, 0.1, 0] },
          h("cylinderGeometry", { args: [0.75, 0.52, 0.7, 32, 1, true] }),
          h("meshStandardMaterial", { color: POT.iron, metalness: 0.55, roughness: 0.4, side: 2 })),
        // rounded belly / bottom
        h("mesh", { position: [0, -0.18, 0] },
          h("sphereGeometry", { args: [0.52, 28, 24] }),
          h("meshStandardMaterial", { color: POT.iron, metalness: 0.55, roughness: 0.4 })),
        // thick rolled rim
        h("mesh", { position: [0, 0.44, 0], rotation: [Math.PI / 2, 0, 0] },
          h("torusGeometry", { args: [0.75, 0.09, 16, 32] }),
          h("meshStandardMaterial", { color: POT.ironDark, metalness: 0.6, roughness: 0.35 })),

        // three stubby feet
        ...[0, 1, 2].map((i) => {
          const a = (i / 3) * Math.PI * 2 + 0.5;
          return h("mesh", { key: "leg" + i, position: [Math.cos(a) * 0.4, -0.52, Math.sin(a) * 0.4] },
            h("sphereGeometry", { args: [0.12, 14, 14] }),
            h("meshStandardMaterial", { color: POT.ironDark, metalness: 0.55, roughness: 0.4 }));
        }),

        // heaped gold nuggets
        ...nuggets.map((n, i) =>
          h("mesh", { key: "gold" + i, position: n.pos, rotation: n.rot },
            h("sphereGeometry", { args: [n.s, 14, 14] }),
            h("meshStandardMaterial", {
              color: n.color,
              metalness: 0.95,
              roughness: 0.15,
              emissive: "#fde047",
              emissiveIntensity: hovered ? 0.35 : 0.08,
            })))
      );
    }

    // ---- A little leprechaun cheering on his pot of gold --------------------
    // Built entirely from primitives: a green top hat with a gold buckle, a
    // ruddy face and ginger beard, a green coat, and one arm flung out toward
    // the diamond in a happy "ta-da!" gesture. He gives a gentle excited bob.
    const LEP = {
      coat: "#111114",
      hat: "#050506",
      band: "#000000",
      gold: "#facc15",
      skin: "#000000",
      beard: "#ff5fbf",
    };

    // A puff of Larry's exhaust. Each fart has a phase offset so the trail is
    // a continuous, staggered plume streaming out behind him.
    const FART_COLORS = ["#b7c94a", "#9caf3a", "#c9d66b", "#a7bf4f"];
    const FART_COUNT = 16;

    function Leprechaun() {
      const group = useRef();
      const arm = useRef();
      const legs = useRef();
      const farts = useRef([]);
      // Timestamp (in clock seconds) when the current jump began; null when grounded.
      const jumpStart = useRef(null);

      // Listen for the "/jump" command sent from the chat bar.
      React.useEffect(() => {
        const onJump = () => { jumpStart.current = "pending"; };
        window.addEventListener("larry-jump", onJump);
        return () => window.removeEventListener("larry-jump", onJump);
      }, []);

      // Deterministic per-puff phase offset + sideways jitter for the fart trail.
      const puffs = React.useMemo(() => {
        let seed = 91;
        const rand = () => {
          seed = (seed * 9301 + 49297) % 233280;
          return seed / 233280;
        };
        return Array.from({ length: FART_COUNT }, (_, i) => ({
          offset: i / FART_COUNT,
          jitter: (rand() - 0.5) * 2,
          color: FART_COLORS[i % FART_COLORS.length],
        }));
      }, []);

      const JUMP_DURATION = 0.8; // seconds
      const JUMP_HEIGHT = 1.9;    // world units at the top of the arc

      // Larry's endless fart-powered orbit.
      const FLY_RADIUS = 3.2;   // how wide his circular flight path is
      const FLY_HEIGHT = 1.25;  // cruising altitude
      const FLY_SPEED = 0.75;   // radians/sec around the circle

      useFrame((state) => {
        const t = state.clock.elapsedTime;

        // Kick off a queued jump now that we have the current clock time.
        if (jumpStart.current === "pending") jumpStart.current = t;

        // Parabolic jump arc: 0 -> 1 -> 0 over JUMP_DURATION.
        let jumpY = 0;      // extra vertical hop on top of the flight
        let p = -1;         // progress through the jump, 0..1 (-1 when grounded)
        if (typeof jumpStart.current === "number") {
          p = (t - jumpStart.current) / JUMP_DURATION;
          if (p >= 1) {
            jumpStart.current = null;
            p = -1;
          } else {
            jumpY = Math.sin(p * Math.PI) * JUMP_HEIGHT;
          }
        }

        // Flap the legs/arm a touch harder during a hop.
        const tuck = p >= 0 ? Math.sin(p * Math.PI) : 0;

        if (group.current) {
          // Circle the meadow, propelled forever by his own exhaust.
          const ang = t * FLY_SPEED;
          group.current.position.x = Math.cos(ang) * FLY_RADIUS;
          group.current.position.z = Math.sin(ang) * FLY_RADIUS;
          group.current.position.y = FLY_HEIGHT + Math.sin(t * 4) * 0.12 + jumpY;

          // Face the direction of travel (tangent to the circle)...
          const vx = -Math.sin(ang), vz = Math.cos(ang);
          group.current.rotation.y = Math.atan2(vx, vz);
          // ...banking into the turn with a jaunty nose-up flying pose.
          group.current.rotation.z = 0.22 + Math.sin(t * 6) * 0.05;
          group.current.rotation.x = -0.28;
          group.current.scale.set(0.9, 0.9, 0.9);
        }
        if (legs.current) {
          // legs trail behind, kicking with the thrust
          legs.current.rotation.x = 0.6 + Math.sin(t * 8) * 0.25 + tuck * 0.4;
        }
        if (arm.current) {
          // the pointing arm flails happily in the wind
          arm.current.rotation.z = -0.6 + Math.sin(t * 9) * 0.3 - tuck * 0.7;
        }

        // Fart exhaust: each puff shoots out his backside (local -Z), spreading,
        // sinking and fading as it goes, then loops back to the nozzle.
        for (let i = 0; i < puffs.length; i++) {
          const m = farts.current[i];
          if (!m) continue;
          const local = (t * 1.5 + puffs[i].offset) % 1; // 0 (fresh) -> 1 (spent)
          m.position.z = -0.55 - local * 3.0;
          m.position.y = -0.5 - local * 0.5 + Math.sin((t + puffs[i].offset) * 9) * 0.05;
          m.position.x = puffs[i].jitter * (0.08 + local * 0.55);
          const s = 0.14 + local * 0.7;
          m.scale.setScalar(s);
          if (m.material) m.material.opacity = Math.max(0, 0.7 * (1 - local));
        }
      });

      return h(
        "group",
        // stand him off to the left, turned slightly to face the diamond
        { ref: group, position: [-2.7, -0.55, 0.2], rotation: [0, 0.5, 0], scale: 0.9 },

        // fart exhaust plume streaming out his backside (positions animated above)
        ...puffs.map((puff, i) =>
          h("mesh", { key: "fart" + i, ref: (el) => (farts.current[i] = el), position: [0, -0.5, -0.55] },
            h("sphereGeometry", { args: [1, 12, 12] }),
            h("meshStandardMaterial", {
              color: puff.color,
              emissive: puff.color,
              emissiveIntensity: 0.4,
              roughness: 1,
              transparent: true,
              opacity: 0.6,
              depthWrite: false,
            }))),

        // legs + buckled shoes (grouped so they can tuck up mid-jump)
        h("group", { ref: legs },
          h("mesh", { position: [-0.16, -0.95, 0] },
            h("cylinderGeometry", { args: [0.11, 0.11, 0.5, 12] }),
            h("meshStandardMaterial", { color: LEP.hat, roughness: 0.8 })),
          h("mesh", { position: [0.16, -0.95, 0] },
            h("cylinderGeometry", { args: [0.11, 0.11, 0.5, 12] }),
            h("meshStandardMaterial", { color: LEP.hat, roughness: 0.8 })),
          h("mesh", { position: [-0.16, -1.24, 0.08] },
            h("boxGeometry", { args: [0.2, 0.14, 0.34] }),
            h("meshStandardMaterial", { color: "#000000", roughness: 0.7 })),
          h("mesh", { position: [0.16, -1.24, 0.08] },
            h("boxGeometry", { args: [0.2, 0.14, 0.34] }),
            h("meshStandardMaterial", { color: "#000000", roughness: 0.7 }))),

        // pot-bellied coat / body
        h("mesh", { position: [0, -0.42, 0] },
          h("sphereGeometry", { args: [0.42, 20, 20] }),
          h("meshStandardMaterial", { color: LEP.coat, roughness: 0.65 })),
        // belt + gold buckle
        h("mesh", { position: [0, -0.5, 0.34], rotation: [Math.PI / 2, 0, 0] },
          h("cylinderGeometry", { args: [0.14, 0.14, 0.1, 6] }),
          h("meshStandardMaterial", { color: LEP.gold, metalness: 0.7, roughness: 0.25 })),

        // left arm resting on the belly
        h("mesh", { position: [-0.42, -0.3, 0.05], rotation: [0, 0, 0.9] },
          h("cylinderGeometry", { args: [0.08, 0.08, 0.5, 10] }),
          h("meshStandardMaterial", { color: LEP.coat, roughness: 0.65 })),

        // right arm flung out toward the diamond (pivots at the shoulder)
        h("group", { ref: arm, position: [0.34, -0.18, 0.1] },
          h("mesh", { position: [0.3, 0, 0], rotation: [0, 0, Math.PI / 2] },
            h("cylinderGeometry", { args: [0.08, 0.08, 0.62, 10] }),
            h("meshStandardMaterial", { color: LEP.coat, roughness: 0.65 })),
          // open hand presenting the gem
          h("mesh", { position: [0.66, 0, 0] },
            h("sphereGeometry", { args: [0.1, 12, 12] }),
            h("meshStandardMaterial", { color: LEP.skin, roughness: 0.6 }))),

        // head
        h("mesh", { position: [0, 0.18, 0] },
          h("sphereGeometry", { args: [0.28, 24, 24] }),
          h("meshStandardMaterial", { color: LEP.skin, roughness: 0.6 })),
        // rosy cheeks
        h("mesh", { position: [-0.14, 0.12, 0.22] },
          h("sphereGeometry", { args: [0.06, 10, 10] }),
          h("meshStandardMaterial", { color: "#2b2b30", roughness: 0.7 })),
        h("mesh", { position: [0.14, 0.12, 0.22] },
          h("sphereGeometry", { args: [0.06, 10, 10] }),
          h("meshStandardMaterial", { color: "#2b2b30", roughness: 0.7 })),
        // eyes
        h("mesh", { position: [-0.1, 0.24, 0.25] },
          h("sphereGeometry", { args: [0.035, 8, 8] }),
          h("meshStandardMaterial", { color: "#20242e" })),
        h("mesh", { position: [0.1, 0.24, 0.25] },
          h("sphereGeometry", { args: [0.035, 8, 8] }),
          h("meshStandardMaterial", { color: "#20242e" })),
        // ginger beard
        h("mesh", { position: [0, 0.02, 0.16], rotation: [Math.PI, 0, 0] },
          h("coneGeometry", { args: [0.26, 0.42, 20] }),
          h("meshStandardMaterial", { color: LEP.beard, roughness: 0.85 })),

        // top hat — brim, stack, band and buckle
        h("mesh", { position: [0, 0.42, 0] },
          h("cylinderGeometry", { args: [0.42, 0.42, 0.05, 24] }),
          h("meshStandardMaterial", { color: LEP.hat, roughness: 0.7 })),
        h("mesh", { position: [0, 0.64, 0] },
          h("cylinderGeometry", { args: [0.27, 0.29, 0.42, 24] }),
          h("meshStandardMaterial", { color: LEP.hat, roughness: 0.7 })),
        h("mesh", { position: [0, 0.5, 0] },
          h("cylinderGeometry", { args: [0.295, 0.305, 0.1, 24] }),
          h("meshStandardMaterial", { color: LEP.band, roughness: 0.7 })),
        h("mesh", { position: [0, 0.5, 0.29] },
          h("boxGeometry", { args: [0.12, 0.09, 0.03] }),
          h("meshStandardMaterial", { color: LEP.gold, metalness: 0.7, roughness: 0.25 }))
      );
    }

    // ---- Lush green meadow --------------------------------------------------
    // A rolling grassy ground plane dotted with tufts of grass and little
    // wildflowers, with a few soft green hills rising in the distance under a
    // blue sky. Replaces the old starfield backdrop.
    const MEADOW = {
      grass: "#4c9a2a",
      grassDark: "#3a7d21",
      hill: "#6bbf4a",
      hillFar: "#8fd06a",
    };

    function Meadow() {
      // Deterministic scatter of grass tufts + flowers across the ground.
      const props = React.useMemo(() => {
        let seed = 42;
        const rand = () => {
          seed = (seed * 9301 + 49297) % 233280;
          return seed / 233280;
        };
        const flowerColors = ["#ffffff", "#ffd93b", "#ff6fb5", "#8b5cf6"];
        const tufts = [];
        const flowers = [];
        for (let i = 0; i < 120; i++) {
          const a = rand() * Math.PI * 2;
          const r = 1.6 + rand() * 7.5;
          const x = Math.cos(a) * r;
          const z = Math.sin(a) * r;
          if (rand() < 0.72) {
            tufts.push({
              pos: [x, -1.28 + rand() * 0.05, z],
              h: 0.22 + rand() * 0.3,
              color: rand() < 0.5 ? MEADOW.grass : MEADOW.grassDark,
              rot: rand() * Math.PI,
            });
          } else {
            flowers.push({
              pos: [x, -1.18 + rand() * 0.05, z],
              color: flowerColors[Math.floor(rand() * flowerColors.length)],
              s: 0.06 + rand() * 0.05,
            });
          }
        }
        return { tufts, flowers };
      }, []);

      return h(
        "group",
        null,
        // flat grassy ground
        h("mesh", { position: [0, -1.3, 0], rotation: [-Math.PI / 2, 0, 0], receiveShadow: true },
          h("circleGeometry", { args: [11, 64] }),
          h("meshStandardMaterial", { color: MEADOW.grass, roughness: 1 })),

        // soft rolling hills in the distance
        ...[
          { p: [-6, -2.2, -7], s: [5, 3, 5], c: MEADOW.hill },
          { p: [5.5, -2.4, -8], s: [6, 3.4, 6], c: MEADOW.hillFar },
          { p: [0, -2.6, -10], s: [8, 4, 8], c: MEADOW.hillFar },
          { p: [8, -2.2, -4], s: [4.5, 2.6, 4.5], c: MEADOW.hill },
        ].map((hill, i) =>
          h("mesh", { key: "hill" + i, position: hill.p, scale: hill.s },
            h("sphereGeometry", { args: [1, 24, 16] }),
            h("meshStandardMaterial", { color: hill.c, roughness: 1 }))),

        // grass tufts (little green blades)
        ...props.tufts.map((t, i) =>
          h("mesh", { key: "tuft" + i, position: t.pos, rotation: [0, t.rot, 0] },
            h("coneGeometry", { args: [0.07, t.h, 5] }),
            h("meshStandardMaterial", { color: t.color, roughness: 1 }))),

        // wildflowers
        ...props.flowers.map((f, i) =>
          h("group", { key: "flower" + i, position: f.pos },
            h("mesh", { position: [0, -0.06, 0] },
              h("cylinderGeometry", { args: [0.012, 0.012, 0.16, 5] }),
              h("meshStandardMaterial", { color: MEADOW.grassDark, roughness: 1 })),
            h("mesh", { position: [0, 0.04, 0] },
              h("sphereGeometry", { args: [f.s, 10, 10] }),
              h("meshStandardMaterial", { color: f.color, roughness: 0.7, emissive: f.color, emissiveIntensity: 0.12 }))))
      );
    }

    // ---- A little swimming pool for Larry ----------------------------------
    // A round in-ground pool: a pale tiled basin sunk into the meadow, a stone
    // coping rim around the edge, and a translucent sheet of water whose surface
    // gently ripples up and down. Larry stands waist-deep in the middle.
    const POOL = {
      center: [-2.7, 0, 0.2],
      radius: 1.5,
      water: "#f7efc9", // creamy mayonnaise
      basin: "#f2e9c4", // mayo-coated basin walls
      coping: "#e7ded0",
    };

    function Pool() {
      const water = useRef();

      useFrame((state) => {
        if (water.current) {
          const t = state.clock.elapsedTime;
          // thick mayonnaise barely wobbles — a slow, heavy jiggle
          water.current.position.y = -0.9 + Math.sin(t * 0.8) * 0.008;
        }
      });

      const [cx, , cz] = POOL.center;

      return h(
        "group",
        { position: [cx, 0, cz] },
        // basin walls (open-topped cylinder sunk deep into the ground)
        h("mesh", { position: [0, -2.1, 0] },
          h("cylinderGeometry", { args: [POOL.radius, POOL.radius * 0.92, 3.0, 48, 1, true] }),
          h("meshStandardMaterial", { color: POOL.basin, roughness: 0.5, metalness: 0.05, side: 2 })),
        // basin floor (sunk way down at the bottom of the deep pool)
        h("mesh", { position: [0, -3.58, 0], rotation: [-Math.PI / 2, 0, 0] },
          h("circleGeometry", { args: [POOL.radius, 48] }),
          h("meshStandardMaterial", { color: POOL.basin, roughness: 0.5 })),
        // stone coping rim around the edge
        h("mesh", { position: [0, -0.62, 0], rotation: [Math.PI / 2, 0, 0] },
          h("torusGeometry", { args: [POOL.radius + 0.02, 0.14, 20, 56] }),
          h("meshStandardMaterial", { color: POOL.coping, roughness: 0.85 })),
        // thick, opaque mayonnaise surface — a matte, creamy gloop
        h("mesh", { ref: water, position: [0, -0.9, 0], rotation: [-Math.PI / 2, 0, 0] },
          h("circleGeometry", { args: [POOL.radius - 0.06, 48] }),
          h("meshStandardMaterial", {
            color: POOL.water,
            roughness: 0.85,
            metalness: 0.0,
            emissive: "#fff6d8",
            emissiveIntensity: 0.06,
          }))
      );
    }

    function HelloText() {
      return h(
        Float,
        { speed: 2, rotationIntensity: 0.4, floatIntensity: 0.8 },
        h(
          Text,
          {
            position: [0, 1.8, 0],
            fontSize: 0.7,
            color: "#f4f6ff",
            anchorX: "center",
            anchorY: "middle",
            outlineWidth: 0.02,
            outlineColor: "#0b0d17",
          },
          "Larry the Leprechaun"
        )
      );
    }

    // A small caption floating just to the right of the pot of gold.
    function ArmMessage() {
      return h(
        Text,
        {
          position: [-2.7, 1.0, 0.2],
          fontSize: 0.22,
          color: "#a5f3fc",
          anchorX: "center",
          anchorY: "middle",
          maxWidth: 2.6,
          lineHeight: 1.15,
          outlineWidth: 0.01,
          outlineColor: "#0b0d17",
        },
        "Larry flies in circles, propelled by his own farts"
      );
    }

    function Scene() {
      return h(
        React.Fragment,
        null,
        // sky-blue backdrop + gentle daylight haze
        h("color", { attach: "background", args: ["#8fd0ee"] }),
        h("fog", { attach: "fog", args: ["#cdeafd", 12, 24] }),
        h("ambientLight", { intensity: 0.75 }),
        h("hemisphereLight", { args: ["#eaf7ff", "#4c9a2a", 0.7] }),
        h("directionalLight", { position: [5, 8, 5], intensity: 1.3 }),
        h(Meadow, null),
        h(HelloText, null),
        h(ArmMessage, null),
        h(Rainbow, null),
        h(PotOfGold, null),
        h(Pool, null),
        h(Leprechaun, null),
        h(OrbitControls, { enablePan: false, minDistance: 3, maxDistance: 12 })
      );
    }

    // Chat-style command bar. Type "/jump" and press Enter to make Larry jump.
    function ChatBar() {
      const [value, setValue] = useState("");
      const send = () => {
        const cmd = value.trim().toLowerCase();
        if (cmd === "/jump") {
          window.dispatchEvent(new Event("larry-jump"));
        }
        setValue("");
      };
      return h(
        "div",
        { className: "chatbar" },
        h("input", {
          value,
          placeholder: "Type /jump and press Enter…",
          onChange: (e) => setValue(e.target.value),
          onKeyDown: (e) => { if (e.key === "Enter") send(); },
        })
      );
    }

    function App() {
      return h(
        React.Fragment,
        null,
        h(
          "div",
          { className: "overlay" },
          h("h1", null, "React 3D Environment"),
          h("p", null, "react-three-fiber · three.js · drei"),
          h("span", { className: "badge" }, "Hello World")
        ),
        h(ChatBar, null),
        h(
          "div",
          { className: "hint" },
          "Larry the leprechaun flies endless circles over his pot of gold, propelled by his own farts · send /jump to make him hop mid-flight · hover to make the gold glow · drag to orbit · scroll to zoom · click to freeze the spin"
        ),
        h(
          Canvas,
          {
            camera: { position: [0, 0, 6], fov: 50 },
            onCreated: () => {
              const el = document.getElementById("loading");
              if (el) el.remove();
            },
          },
          h(Scene, null)
        )
      );
    }

    createRoot(document.getElementById("root")).render(h(App, null));
  </script>
</body>
</html>
